<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-bg: #000;
        --c-fg: #ffffff;
        --c-purple: #8b5cf6;
        --c-magenta: #ec4899;
        --c-orange: #fb923c;
        --c-yellow: #fbbf24;
        --c-cyan: #2dd4bf;
        --c-lime: #a3e635;

        --grad: linear-gradient(
          92deg,
          #a855f7 0%,
          #ec4899 16%,
          #fb923c 33%,
          #fbbf24 50%,
          #2dd4bf 66%,
          #a3e635 83%,
          #a855f7 100%
        );
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        background: var(--c-bg);
        color: var(--c-fg);
        font-family: "Unbounded", sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        isolation: isolate;
      }

      .scene {
        position: relative;
        text-align: center;
        z-index: 2;
      }

      .title {
        display: inline-block;
        font-weight: 900;
        font-size: clamp(2.5rem, 11vw, 9rem);
        letter-spacing: 0.04em;
        line-height: 1;
        margin: 0;
        text-transform: uppercase;
        background: var(--grad);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: holo-shift 8s linear infinite;
      }

      @keyframes holo-shift {
        0%   { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }

      .status {
        margin-top: 1.6rem;
        font-weight: 400;
        font-size: clamp(0.7rem, 1.4vw, 0.95rem);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--c-lime);
        opacity: 0.9;
      }

      .flower {
        display: block;
        margin: 0 auto 2.2rem;
        width: clamp(220px, 38vw, 460px);
        height: auto;
        filter: drop-shadow(0 0 24px rgba(236, 72, 153, 0.55))
                drop-shadow(0 0 60px rgba(168, 85, 247, 0.35));
        animation: flower-spin 28s linear infinite 2s;
      }

      .flower .petal {
        mix-blend-mode: screen;
      }

      .flower .petal-cell {
        transform-origin: 100px 100px;
        animation:
          petal-bloom 0.75s cubic-bezier(.2, .9, .3, 1.1) calc(var(--i, 0) * 0.07s) both,
          petal-pulse 4.2s ease-in-out calc(var(--i, 0) * 0.07s + 0.75s) infinite;
      }

      .flower .core {
        transform-origin: 100px 100px;
        animation:
          core-bloom 0.55s cubic-bezier(.2, .9, .3, 1.15) 1.5s both,
          core-pulse 2.8s ease-in-out 2.05s infinite;
      }

      .flower .core-dot {
        transform-origin: 100px 100px;
        animation: core-bloom 0.45s cubic-bezier(.2, .9, .3, 1.15) 1.7s both;
      }

      .flower .ring {
        transform-origin: 100px 100px;
        animation:
          ring-spin 18s linear infinite,
          ring-fade 1s ease-out 1.6s both;
      }

      .flower .ring--rev {
        animation:
          ring-spin 24s linear infinite reverse,
          ring-fade 1s ease-out 1.8s both;
      }

      @keyframes flower-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes petal-bloom {
        0%   { transform: scale(0);    opacity: 0; }
        60%  { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1);    opacity: 1; }
      }

      @keyframes petal-pulse {
        0%, 100% { transform: scale(1);    opacity: 0.92; }
        50%      { transform: scale(1.04); opacity: 1; }
      }

      @keyframes core-bloom {
        0%   { transform: scale(0);   opacity: 0; }
        60%  { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1);   opacity: 1; }
      }

      @keyframes core-pulse {
        0%, 100% { transform: scale(1);    filter: brightness(1); }
        50%      { transform: scale(1.18); filter: brightness(1.4); }
      }

      @keyframes ring-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes ring-fade {
        from { stroke-opacity: 0; }
        to   { stroke-opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .flower,
        .flower .petal-cell,
        .flower .core,
        .flower .core-dot,
        .flower .ring { animation: none; }
      }
      .grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(168, 85, 247, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(45, 212, 191, 0.07) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
        z-index: 1;
      }

      @media (prefers-reduced-motion: reduce) {
        .title { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="scene">
      <svg
        class="flower"
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Cyberpunk flower"
      >
        <defs>
          <linearGradient id="petalGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#a855f7" />
            <stop offset="25%"  stop-color="#ec4899" />
            <stop offset="50%"  stop-color="#fb923c" />
            <stop offset="75%"  stop-color="#2dd4bf" />
            <stop offset="100%" stop-color="#a3e635" />
          </linearGradient>

          <radialGradient id="coreGrad" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%"   stop-color="#ffffff" />
            <stop offset="35%"  stop-color="#fbbf24" />
            <stop offset="70%"  stop-color="#ec4899" />
            <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
          </radialGradient>

          <path
            id="petal"
            d="M100 100
               C 118 70, 118 38, 100 18
               C 82 38, 82 70, 100 100 Z"
          />
        </defs>

        <!-- outer rings -->
        <circle class="ring" cx="100" cy="100" r="92"
                fill="none" stroke="url(#petalGrad)" stroke-width="0.6"
                stroke-dasharray="2 6" />
        <circle class="ring ring--rev" cx="100" cy="100" r="78"
                fill="none" stroke="#2dd4bf" stroke-width="0.4"
                stroke-dasharray="1 4" opacity="0.5" />

        <!-- back layer petals -->
        <g opacity="0.55">
          <g transform="rotate(22.5 100 100)"><g class="petal-cell" style="--i: 0"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(67.5 100 100)"><g class="petal-cell" style="--i: 2"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(112.5 100 100)"><g class="petal-cell" style="--i: 4"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(157.5 100 100)"><g class="petal-cell" style="--i: 6"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(202.5 100 100)"><g class="petal-cell" style="--i: 8"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(247.5 100 100)"><g class="petal-cell" style="--i: 10"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(292.5 100 100)"><g class="petal-cell" style="--i: 12"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
          <g transform="rotate(337.5 100 100)"><g class="petal-cell" style="--i: 14"><use href="#petal" class="petal" fill="url(#petalGrad)" /></g></g>
        </g>

        <!-- front petals + neon outline -->
        <g>
          <g transform="rotate(0 100 100)"><g class="petal-cell" style="--i: 1"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(45 100 100)"><g class="petal-cell" style="--i: 3"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(90 100 100)"><g class="petal-cell" style="--i: 5"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(135 100 100)"><g class="petal-cell" style="--i: 7"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(180 100 100)"><g class="petal-cell" style="--i: 9"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(225 100 100)"><g class="petal-cell" style="--i: 11"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(270 100 100)"><g class="petal-cell" style="--i: 13"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
          <g transform="rotate(315 100 100)"><g class="petal-cell" style="--i: 15"><use href="#petal" class="petal" fill="url(#petalGrad)" /><use href="#petal" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.35" /></g></g>
        </g>

        <!-- glowing core -->
        <circle class="core" cx="100" cy="100" r="22" fill="url(#coreGrad)" />
        <circle class="core-dot" cx="100" cy="100" r="6" fill="#ffffff" />
      </svg>

      <h1 class="title">HELLO WORLD</h1>
      <div class="status">// CNVG HELLO</div>
    </div>
  </body>
</html>
