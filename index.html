<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-bg: #000;
        --c-fg: #ffffff;
        --c-purple: #8b5cf6;
        --c-magenta: #ec4899;
        --c-orange: #fb923c;
        --c-yellow: #fbbf24;
        --c-cyan: #2dd4bf;
        --c-lime: #a3e635;

        --grad: linear-gradient(
          92deg,
          #a855f7 0%,
          #ec4899 25%,
          #fb923c 50%,
          #fbbf24 65%,
          #2dd4bf 82%,
          #a3e635 100%
        );
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        background: var(--c-bg);
        color: var(--c-fg);
        font-family: "Unbounded", sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        isolation: isolate;
      }

      .scene {
        position: relative;
        text-align: center;
        z-index: 2;
      }

      .title {
        display: inline-block;
        font-weight: 900;
        font-size: clamp(2.5rem, 11vw, 9rem);
        letter-spacing: 0.04em;
        line-height: 1;
        margin: 0;
        text-transform: uppercase;
        background: var(--grad);
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 22px rgba(236, 72, 153, 0.35))
                drop-shadow(0 0 40px rgba(45, 212, 191, 0.18));
        animation: holo-shift 6s linear infinite;
      }

      .status {
        margin-top: 1.6rem;
        font-weight: 400;
        font-size: clamp(0.7rem, 1.4vw, 0.95rem);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--c-lime);
        opacity: 0.9;
      }
      .status .dot {
        display: inline-block;
        width: 0.55em;
        height: 0.55em;
        background: var(--c-lime);
        border-radius: 50%;
        margin-right: 0.6em;
        vertical-align: middle;
        box-shadow: 0 0 10px var(--c-lime), 0 0 20px var(--c-lime);
      }

      .grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(168, 85, 247, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(45, 212, 191, 0.07) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
        z-index: 1;
      }

      @keyframes holo-shift {
        0%   { background-position: 0% 50%; }
        100% { background-position: 220% 50%; }
      }

      @media (prefers-reduced-motion: reduce) {
        .title { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="scene">
      <h1 class="title">HELLO WORLD</h1>
      <div class="status"><span class="dot"></span>SYS://CNVG · CONNECTION SECURE</div>
    </div>
  </body>
</html>
