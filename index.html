<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-bg: #000;
        --c-fg: #ffffff;
        --c-purple: #8b5cf6;
        --c-magenta: #ec4899;
        --c-orange: #fb923c;
        --c-yellow: #fbbf24;
        --c-cyan: #2dd4bf;
        --c-lime: #a3e635;
        /* glitch channels */
        --c-r: #ec4899;  /* magenta channel */
        --c-c: #2dd4bf;  /* cyan channel */
        --c-y: #fbbf24;  /* yellow flash */

        --grad: linear-gradient(
          92deg,
          #a855f7 0%,
          #ec4899 25%,
          #fb923c 50%,
          #fbbf24 65%,
          #2dd4bf 82%,
          #a3e635 100%
        );
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        height: 100%;
        background: var(--c-bg);
        color: var(--c-fg);
        font-family: "Unbounded", sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        isolation: isolate;
      }

      /* Scene wrapper */
      .scene {
        position: relative;
        text-align: center;
        z-index: 2;
      }

      /* Main glitch text */
      .glitch {
        position: relative;
        display: inline-block;
        font-weight: 900;
        font-size: clamp(2.5rem, 11vw, 9rem);
        letter-spacing: 0.04em;
        line-height: 1;
        margin: 0;
        text-transform: uppercase;
        color: var(--c-fg);
        background: var(--grad);
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 22px rgba(236, 72, 153, 0.35))
                drop-shadow(0 0 40px rgba(45, 212, 191, 0.18));
        animation:
          jitter 3.4s steps(1) infinite,
          holo-shift 6s linear infinite;
      }

      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        pointer-events: none;
        mix-blend-mode: screen;
        text-shadow: none;
      }

      .glitch::before {
        color: var(--c-r);
        transform: translate3d(0, 0, 0);
        animation:
          rgb-shift-r 2.6s infinite linear,
          slice-r 4.2s infinite steps(1);
        clip-path: inset(0 0 0 0);
      }

      .glitch::after {
        color: var(--c-c);
        transform: translate3d(0, 0, 0);
        animation:
          rgb-shift-c 2.9s infinite linear,
          slice-c 3.7s infinite steps(1);
        clip-path: inset(0 0 0 0);
      }

      /* Subtitle / status line */
      .status {
        margin-top: 1.6rem;
        font-weight: 400;
        font-size: clamp(0.7rem, 1.4vw, 0.95rem);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--c-lime);
        opacity: 0.9;
        animation: flicker 4s infinite;
      }
      .status .dot {
        display: inline-block;
        width: 0.55em;
        height: 0.55em;
        background: var(--c-lime);
        border-radius: 50%;
        margin-right: 0.6em;
        vertical-align: middle;
        box-shadow: 0 0 10px var(--c-lime), 0 0 20px var(--c-lime);
        animation: blink 1s infinite steps(2);
      }

      /* Scanlines overlay */
      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 3px
        );
        mix-blend-mode: overlay;
        z-index: 5;
        animation: scan-drift 8s linear infinite;
      }

      /* CRT vignette + scan flash */
      .crt {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse at center,
            transparent 55%,
            rgba(0, 0, 0, 0.65) 100%
          );
        z-index: 6;
      }
      .crt::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 22vh;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 255, 240, 0.05) 50%,
          transparent 100%
        );
        animation: scan-flash 5.5s linear infinite;
      }

      /* Random glitch flash bar */
      .flash {
        position: fixed;
        left: 0;
        right: 0;
        height: 4vh;
        background: var(--c-y);
        mix-blend-mode: difference;
        z-index: 4;
        opacity: 0;
        pointer-events: none;
        animation: flash-bar 7s infinite;
      }

      /* Background grid */
      .grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(168, 85, 247, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(45, 212, 191, 0.07) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
        z-index: 1;
        animation: grid-pan 20s linear infinite;
      }

      /* Holographic glow blobs behind text */
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.55;
        z-index: 0;
        pointer-events: none;
      }
      .blob.b1 {
        width: 38vmax; height: 38vmax;
        background: radial-gradient(circle, #a855f7 0%, transparent 65%);
        top: -10vmax; left: -10vmax;
        animation: blob-float-1 14s ease-in-out infinite;
      }
      .blob.b2 {
        width: 34vmax; height: 34vmax;
        background: radial-gradient(circle, #ec4899 0%, transparent 65%);
        bottom: -8vmax; right: -8vmax;
        animation: blob-float-2 18s ease-in-out infinite;
      }
      .blob.b3 {
        width: 28vmax; height: 28vmax;
        background: radial-gradient(circle, #2dd4bf 0%, transparent 65%);
        top: 30%; right: 10%;
        animation: blob-float-3 22s ease-in-out infinite;
      }

      @keyframes blob-float-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(8vw, 6vh) scale(1.15); }
      }
      @keyframes blob-float-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-10vw, -8vh) scale(0.9); }
      }
      @keyframes blob-float-3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-6vw, 10vh) scale(1.2); }
      }

      @keyframes holo-shift {
        0%   { background-position: 0% 50%; }
        100% { background-position: 220% 50%; }
      }

      /* ===== Keyframes ===== */

      @keyframes jitter {
        0%, 92%, 100% { transform: translate(0, 0); }
        93% { transform: translate(-2px, 1px); }
        94% { transform: translate(3px, -2px); }
        95% { transform: translate(-1px, 0); }
        96% { transform: translate(2px, 2px); }
        97% { transform: translate(-3px, -1px); }
      }

      @keyframes rgb-shift-r {
        0%   { transform: translate(0, 0); }
        20%  { transform: translate(-3px, 1px); }
        40%  { transform: translate(2px, -2px); }
        60%  { transform: translate(-4px, 0); }
        80%  { transform: translate(3px, 2px); }
        100% { transform: translate(0, 0); }
      }
      @keyframes rgb-shift-c {
        0%   { transform: translate(0, 0); }
        25%  { transform: translate(3px, -1px); }
        50%  { transform: translate(-2px, 2px); }
        75%  { transform: translate(4px, 0); }
        100% { transform: translate(0, 0); }
      }

      @keyframes slice-r {
        0%, 100% { clip-path: inset(0 0 0 0); }
        10% { clip-path: inset(20% 0 60% 0); }
        20% { clip-path: inset(70% 0 5% 0); }
        30% { clip-path: inset(40% 0 40% 0); }
        40% { clip-path: inset(0 0 85% 0); }
        50% { clip-path: inset(60% 0 20% 0); }
        60% { clip-path: inset(15% 0 70% 0); }
        70% { clip-path: inset(80% 0 0 0); }
        80% { clip-path: inset(0 0 50% 0); }
        90% { clip-path: inset(35% 0 35% 0); }
      }
      @keyframes slice-c {
        0%, 100% { clip-path: inset(0 0 0 0); }
        12% { clip-path: inset(50% 0 30% 0); }
        24% { clip-path: inset(10% 0 75% 0); }
        36% { clip-path: inset(80% 0 5% 0); }
        48% { clip-path: inset(30% 0 50% 0); }
        60% { clip-path: inset(0 0 70% 0); }
        72% { clip-path: inset(65% 0 15% 0); }
        84% { clip-path: inset(20% 0 60% 0); }
      }

      @keyframes flicker {
        0%, 100% { opacity: 0.85; }
        2%  { opacity: 0.3; }
        3%  { opacity: 0.95; }
        20% { opacity: 0.7; }
        21% { opacity: 0.95; }
        50% { opacity: 0.5; }
        51% { opacity: 0.9; }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }

      @keyframes scan-drift {
        0%   { background-position: 0 0; }
        100% { background-position: 0 100vh; }
      }

      @keyframes scan-flash {
        0%   { top: -25vh; opacity: 0; }
        10%  { opacity: 0.6; }
        50%  { opacity: 0.9; }
        90%  { opacity: 0.6; }
        100% { top: 100vh; opacity: 0; }
      }

      @keyframes flash-bar {
        0%, 100% { opacity: 0; top: 30%; }
        45% { opacity: 0; top: 30%; }
        46% { opacity: 0.85; top: 42%; }
        47% { opacity: 0; top: 42%; }
        70% { opacity: 0; top: 60%; }
        71% { opacity: 0.7; top: 18%; }
        72% { opacity: 0; top: 18%; }
      }

      @keyframes grid-pan {
        0%   { background-position: 0 0, 0 0; }
        100% { background-position: 48px 48px, 48px 48px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .glitch, .glitch::before, .glitch::after,
        .status, .status .dot, .scanlines, .crt::after,
        .flash, .grid {
          animation: none;
        }
        .glitch::before, .glitch::after { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="grid"></div>
    <div class="scene">
      <h1 class="glitch" data-text="HELLO WORLD" id="glitch">HELLO WORLD</h1>
      <div class="status"><span class="dot"></span>SYS://CNVG · CONNECTION SECURE</div>
    </div>
    <div class="flash"></div>
    <div class="scanlines"></div>
    <div class="crt"></div>

    <script>
      // Periodic character scramble
      (() => {
        const el = document.getElementById('glitch');
        const original = el.dataset.text;
        const glyphs = '!<>-_\\/[]{}—=+*^?#________ABCDEFGHIJKLMNOPQRSTUVWXYZ01';
        let scrambling = false;

        function scramble(duration = 700) {
          if (scrambling) return;
          scrambling = true;
          const start = performance.now();
          const chars = original.split('');
          const lockTimes = chars.map(() => Math.random() * duration * 0.7);

          function frame(now) {
            const t = now - start;
            const out = chars.map((c, i) => {
              if (c === ' ') return ' ';
              if (t > lockTimes[i]) return c;
              return glyphs[Math.floor(Math.random() * glyphs.length)];
            }).join('');
            el.textContent = out;
            el.dataset.text = out;
            if (t < duration) {
              requestAnimationFrame(frame);
            } else {
              el.textContent = original;
              el.dataset.text = original;
              scrambling = false;
            }
          }
          requestAnimationFrame(frame);
        }

        function loop() {
          scramble(600 + Math.random() * 600);
          setTimeout(loop, 2200 + Math.random() * 3200);
        }
        setTimeout(loop, 1500);

        // Trigger on click for fun
        document.addEventListener('click', () => scramble(900));
      })();
    </script>
  </body>
</html>
